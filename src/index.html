<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenWriter</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="main.js" defer></script>
</head>
<body>
  <!-- Custom drag area for borderless window -->
  <div class="drag-bar" data-tauri-drag-region></div>

  <!-- Ambient background (animated gradient colors) -->
  <div class="ambient-bg" id="ambient-bg"></div>
  
  <!-- Interactive canvas for typing particles and zen ambient effects -->
  <canvas id="particles-canvas" class="particles-canvas"></canvas>

  <div class="app-container">
    
    <!-- Sidebar / Settings Overlay (auto-fades during typing) -->
    <aside class="sidebar" id="ui-sidebar">
      <div class="sidebar-header">
        <span class="logo-title">ZenWriter</span>
      </div>

      <!-- Scrollable body for settings sections -->
      <div class="sidebar-body">
        <!-- Theme Section -->
        <div class="settings-section">
          <span class="section-title">Tema</span>
          <div class="theme-picker">
            <button class="theme-btn active" data-theme="nord" title="Nordic Frost"></button>
            <button class="theme-btn" data-theme="midnight" title="Midnight Velvet"></button>
            <button class="theme-btn" data-theme="forest" title="Forest Zen"></button>
            <button class="theme-btn" data-theme="monochrome" title="Monochrome"></button>
          </div>
        </div>

        <!-- Typography Section -->
        <div class="settings-section">
          <span class="section-title">Tipografia</span>
          <div class="sound-row">
            <label for="select-font">Carattere</label>
            <select id="select-font">
              <option value="sans">Modern (Sans)</option>
              <option value="serif">Classico (Serif)</option>
              <option value="mono">Retro (Mono)</option>
            </select>
          </div>
          <div class="sound-row font-size-row">
            <label>Dimensione</label>
            <div class="size-controls">
              <button id="btn-font-dec" class="size-btn" title="Riduci carattere">—</button>
              <span id="font-size-val">18px</span>
              <button id="btn-font-inc" class="size-btn" title="Aumenta carattere">+</button>
            </div>
          </div>
        </div>

        <!-- Soundscape & Keyboard Section -->
        <div class="settings-section">
          <span class="section-title">Audio & Tasti</span>
          <div class="sound-row">
            <label for="checkbox-keyboard">Suono Tasti</label>
            <label class="toggle-switch">
              <input type="checkbox" id="checkbox-keyboard" checked />
              <span class="slider"></span>
            </label>
          </div>
          <div class="sound-row" id="keyboard-profile-container">
            <label for="select-keyboard-profile">Tipo Click</label>
            <select id="select-keyboard-profile">
              <option value="classic">Meccanica</option>
              <option value="chiclet">Chiclet (Soft)</option>
              <option value="typewriter">Macchina Scrivere</option>
            </select>
          </div>
          <div class="sound-row">
            <label for="select-ambient">Sottofondo</label>
            <select id="select-ambient">
              <option value="none">Nessuno</option>
              <option value="rain">Pioggia Zen</option>
              <option value="wind">Vento del Nord</option>
              <option value="lofi">Mellow Chords</option>
            </select>
          </div>
          <div class="sound-row volume-row" id="ambient-volume-container" style="display: none;">
            <label for="range-volume">Volume Ambiente</label>
            <input type="range" id="range-volume" min="0" max="100" value="50" />
          </div>
        </div>

        <!-- Writing Goal Section -->
        <div class="settings-section">
          <span class="section-title">Obiettivo Giornaliero</span>
          <div class="sound-row">
            <label for="input-goal">Parole Target</label>
            <input type="number" id="input-goal" min="10" max="5000" value="200" step="50" class="sidebar-input" />
          </div>
          <div class="goal-progress-container">
            <div class="goal-progress-bar" id="goal-progress-bar" style="width: 0%;"></div>
          </div>
          <span id="goal-percentage" class="stats-detail">0% completato</span>
        </div>

        <!-- Writing Stats Section -->
        <div class="settings-section">
          <span class="section-title">Sessione</span>
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-val" id="stat-timer">00:00</span>
              <span class="stat-label">Tempo</span>
            </div>
            <div class="stat-card">
              <span class="stat-val" id="stat-wpm">0</span>
              <span class="stat-label">WPM</span>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="btn-export" class="sidebar-btn btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Esporta Testo
        </button>
      </div>
    </aside>

    <!-- Editor Workspace Area -->
    <main class="editor-area">
      <div class="editor-wrapper">
        <textarea id="editor" placeholder="Inizia a scrivere la tua storia qui..."></textarea>
      </div>

      <!-- Bottom Status Bar (auto-fades during typing) -->
      <footer class="status-bar" id="ui-status-bar">
        <div class="status-left">
          <span id="char-count">0 caratteri</span>
          <span class="separator">•</span>
          <span id="word-count">0 parole</span>
        </div>
        <div class="status-right">
          <span id="save-status">Salvato in locale</span>
        </div>
      </footer>
    </main>

  </div>
</body>
</html>
